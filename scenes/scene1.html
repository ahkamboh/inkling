<html><head><meta charset="utf-8"><style>
html,body{margin:0;background:#fff}
.stage{width:1920px}
svg.sc{display:block;width:1920px;height:auto}
.gst,.gey,.caf,.ad,.l1,.l2,.l3,.zz{transform-box:fill-box}
.gst{transform-origin:center bottom;animation:bob 1.4s infinite ease-in-out}
.gey{transform-origin:center;animation:awake 3.2s infinite ease-in-out}
.caf{transform-origin:center;animation:wig 1.3s infinite ease-in-out}
.ad{animation:trav 6s infinite ease-in-out}
.zz{transform-origin:center;animation:zz 6s infinite ease-in-out}
.l1{animation:fin .6s .3s ease-out both}.l2{animation:fin .6s .9s ease-out both}.l3{animation:fin .6s 1.5s ease-out both}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes awake{0%,90%,100%{transform:scaleY(1)}94%{transform:scaleY(.12)}97%{transform:scaleY(1)}}
@keyframes wig{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
@keyframes trav{0%{transform:translate(0,0);opacity:0}7%{opacity:1}36%{transform:translate(196px,92px)}43%{transform:translate(176px,84px)}51%{transform:translate(196px,92px)}58%{transform:translate(174px,82px)}90%{transform:translate(0,0);opacity:1}96%{opacity:0}100%{transform:translate(0,0);opacity:0}}
@keyframes zz{0%,55%{opacity:0;transform:translateY(0)}62%{opacity:.9;transform:translateY(-6px)}74%{opacity:0;transform:translateY(-12px)}100%{opacity:0}}
@keyframes fin{0%{opacity:0;transform:translateY(5px)}100%{opacity:1;transform:translateY(0)}}
</style></head><body><div class="stage">
