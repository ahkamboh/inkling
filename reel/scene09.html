<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles/themes.css"><style>
html,body{margin:0;background:#fff}.stage{width:1920px}
svg.sc{display:block;width:1920px;height:1080px}
.sc text{font-family:'Bradley Hand','Chalkboard SE','Comic Sans MS',cursive}
.bd{fill:var(--fill);stroke:var(--ink);stroke-width:var(--bw);stroke-linejoin:round}.ey{fill:var(--eye)}
.lg,.am{fill:none;stroke:var(--ink);stroke-width:var(--bw);stroke-linecap:round}
.ms,.eyg,.jw,.bang,.shd{transform-box:fill-box}
.ms{transform-origin:center bottom;animation:br 2.8s infinite ease-in-out}
.eyg{transform-origin:center;animation:bk 2.8s infinite ease-in-out}
.jw{transform-origin:center bottom;animation:jump 1.4s infinite ease-in-out}
.shd{transform-origin:center;animation:shd 1.4s infinite ease-in-out}
.bang{transform-origin:center;animation:bang 1.4s infinite ease-in-out}
@keyframes br{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.02)}}
@keyframes bk{0%,80%,100%{transform:scaleY(1)}85%{transform:scaleY(.1)}90%{transform:scaleY(1)}}
@keyframes jump{0%,100%{transform:translateY(0) scaleY(1)}14%{transform:translateY(0) scaleY(.84)}40%{transform:translateY(-58px) scaleY(1.08)}66%{transform:translateY(0) scaleY(.9)}80%{transform:translateY(0) scaleY(1.02)}}
@keyframes shd{0%,100%{transform:scaleX(1);opacity:.5}40%{transform:scaleX(.6);opacity:.25}}
@keyframes bang{0%,28%{opacity:0;transform:scale(.4)}44%{opacity:1;transform:scale(1.1)}66%{opacity:1}80%{opacity:0;transform:scale(1)}100%{opacity:0}}
</style></head><body><div class="stage">
<svg class="sc" viewBox="0 0 680 383"><rect width="680" height="383" fill="var(--bg)"/>
<ellipse class="shd" cx="340" cy="316" rx="38" ry="7" fill="var(--ink)" opacity="0.5"/>
<g transform="translate(200,0)"><g class="jw"><g class="ms">
<path class="bd" d="M140,202 C113,202 106,244 109,272 C110,288 124,296 140,296 C156,296 170,288 171,272 C174,244 167,202 140,202 Z"/>
<g class="eyg"><circle class="ey" cx="131" cy="242" r="5"/><circle class="ey" cx="149" cy="242" r="5"/></g>
<path class="lg" d="M133,295 L130,308 M147,295 L150,308 M126,308 L138,308 M144,308 L156,308"/>
<path class="am" d="M114,246 C104,238 100,228 102,218"/><path class="am" d="M168,246 C178,238 182,228 180,218"/>
</g></g></g>
<text class="bang" x="430" y="150" text-anchor="middle" font-size="46" fill="var(--a2)">!</text>
</svg></div></body></html>
