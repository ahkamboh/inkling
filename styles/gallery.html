<html><head><meta charset="utf-8"><link rel="stylesheet" href="themes.css"><style>
*{box-sizing:border-box}
body{margin:0;background:#fff;font-family:-apple-system,'Segoe UI',sans-serif;color:#1c1c1c}
.wrap{width:1080px;padding:28px}
h2{font-size:15px;font-weight:600;color:#9a948a;letter-spacing:.04em;text-transform:uppercase;margin:6px 0 14px}
.grid{display:grid;gap:14px}
.themes{grid-template-columns:repeat(3,1fr)}
.shapes{grid-template-columns:repeat(4,1fr);margin-top:30px}
.cell{position:relative;border-radius:14px;height:188px;display:flex;align-items:center;justify-content:center;background:var(--bg);border:1px solid rgba(0,0,0,.06);overflow:hidden}
.cell[data-theme="grid"]{background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:22px 22px}
.fig{width:124px;height:148px;transform-box:fill-box;transform-origin:center bottom;animation:bob 2.6s infinite ease-in-out}
.cell:nth-child(3n) .fig{animation-delay:.5s}.cell:nth-child(3n+1) .fig{animation-delay:1s}.cell:nth-child(4n) .fig{animation-delay:.8s}
.tag{position:absolute;left:14px;bottom:12px;font-size:13px;color:var(--label);font-weight:500}
.key{position:absolute;right:14px;bottom:12px;font-size:11px;color:var(--label);opacity:.7;font-family:ui-monospace,Menlo,monospace}
.shapes .cell{height:168px}
.body{fill:var(--fill);stroke:var(--ink);stroke-width:var(--bw);stroke-linejoin:round}
.eye{fill:var(--eye);transform-box:fill-box;transform-origin:center;animation:bl 3.9s infinite ease-in-out}
.limb{fill:none;stroke:var(--ink);stroke-width:var(--bw);stroke-linecap:round}.block{fill:var(--block);stroke:var(--ink);stroke-width:calc(var(--bw) - .7)}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes bl{0%,90%,100%{transform:scaleY(1)}93%{transform:scaleY(.12)}96%{transform:scaleY(1)}}
</style></head><body>
<svg xmlns="http://www.w3.org/2000/svg" style="display:none"><defs>
<g id="ab"><path class="limb" d="M60,66 C67,58 71,50 73,42"/><rect class="block" x="64" y="24" width="16" height="16" rx="2" transform="rotate(-6 72 32)"/></g>
<symbol id="c-bean" viewBox="0 0 100 130"><path class="body" d="M42,46 C24,46 19,70 22,90 C23,102 31,108 42,108 C53,108 61,102 62,90 C65,70 60,46 42,46 Z"/><path class="limb" d="M38,107 L36,120 M48,107 L50,120 M30,120 L42,120 M46,120 L58,120"/><use href="#ab"/><circle class="eye" cx="35" cy="72" r="4"/><circle class="eye" cx="49" cy="72" r="4"/></symbol>
<symbol id="c-round" viewBox="0 0 100 130"><circle class="body" cx="42" cy="76" r="30"/><path class="limb" d="M37,104 L35,118 M48,104 L50,118 M29,118 L41,118 M46,118 L58,118"/><use href="#ab"/><circle class="eye" cx="35" cy="74" r="4"/><circle class="eye" cx="49" cy="74" r="4"/></symbol>

<symbol id="c-triangle" viewBox="0 0 100 130"><path class="body" d="M42,42 L72,104 Q75,110 68,110 L16,110 Q9,110 12,104 Z"/><path class="limb" d="M36,109 L34,122 M48,109 L50,122 M28,122 L40,122 M46,122 L58,122"/><use href="#ab"/><circle class="eye" cx="36" cy="88" r="4"/><circle class="eye" cx="48" cy="88" r="4"/></symbol>
<symbol id="c-pill" viewBox="0 0 100 130"><rect class="body" x="10" y="60" width="64" height="46" rx="23"/><path class="limb" d="M30,105 L28,118 M54,105 L56,118 M22,118 L34,118 M50,118 L62,118"/><use href="#ab"/><circle class="eye" cx="34" cy="82" r="4"/><circle class="eye" cx="50" cy="82" r="4"/></symbol>
<symbol id="c-cloud" viewBox="0 0 100 130"><path class="body" d="M20,92 C9,92 7,79 17,75 C14,62 31,57 40,64 C47,52 67,55 68,69 C81,69 81,86 70,89 C70,100 50,103 43,94 C32,101 22,100 20,92 Z"/><path class="limb" d="M36,100 L34,114 M50,100 L52,114 M28,114 L40,114 M48,114 L60,114"/><use href="#ab"/><circle class="eye" cx="34" cy="80" r="4"/><circle class="eye" cx="48" cy="80" r="4"/></symbol>
<symbol id="c-ghost" viewBox="0 0 100 130"><path class="body" d="M42,44 C21,44 14,74 14,94 L14,112 Q21,103 28,112 Q35,121 42,112 Q49,103 56,112 Q63,121 70,112 L70,94 C70,74 63,44 42,44 Z"/><use href="#ab"/><circle class="eye" cx="35" cy="80" r="4"/><circle class="eye" cx="49" cy="80" r="4"/></symbol>
</defs></svg>
<div class="wrap">
<h2>themes — data-theme="key"</h2>
<div class="grid themes">

<div class="cell" data-theme="flat"><svg class="fig" viewBox="0 0 100 130"><use href="#c-bean"/></svg><span class="tag">bold flat</span><span class="key">flat</span></div>
<div class="cell" data-theme="blueprint"><svg class="fig" viewBox="0 0 100 130"><use href="#c-bean"/></svg><span class="tag">blueprint</span><span class="key">blueprint</span></div>
<div class="cell" data-theme="chalk"><svg class="fig" viewBox="0 0 100 130"><use href="#c-bean"/></svg><span class="tag">chalkboard</span><span class="key">chalk</span></div>
<div class="cell" data-theme="riso"><svg class="fig" viewBox="0 0 100 130"><use href="#c-bean"/></svg><span class="tag">riso duotone</span><span class="key">riso</span></div>
<div class="cell" data-theme="neon"><svg class="fig" viewBox="0 0 100 130"><use href="#c-bean"/></svg><span class="tag">neon</span><span class="key">neon</span></div>
<div class="cell" data-theme="grid"><svg class="fig" viewBox="0 0 100 130"><use href="#c-bean"/></svg><span class="tag">notebook</span><span class="key">grid</span></div>
<div class="cell" data-theme="marker"><svg class="fig" viewBox="0 0 100 130"><use href="#c-bean"/></svg><span class="tag">marker</span><span class="key">marker</span></div>
<div class="cell" data-theme="pastel"><svg class="fig" viewBox="0 0 100 130"><use href="#c-bean"/></svg><span class="tag">pastel</span><span class="key">pastel</span></div>
</div>
<h2>shapes — &lt;use href="#c-key"&gt;</h2>
<div class="grid shapes">
<div class="cell" data-theme="ink"><svg class="fig" viewBox="0 0 100 130"><use href="#c-bean"/></svg><span class="tag">bean</span><span class="key">c-bean</span></div>
<div class="cell" data-theme="ink"><svg class="fig" viewBox="0 0 100 130"><use href="#c-round"/></svg><span class="tag">round</span><span class="key">c-round</span></div>
<div class="cell" data-theme="ink"><svg class="fig" viewBox="0 0 100 130"><use href="#c-square"/></svg><span class="tag">square</span><span class="key">c-square</span></div>
<div class="cell" data-theme="ink"><svg class="fig" viewBox="0 0 100 130"><use href="#c-tall"/></svg><span class="tag">tall</span><span class="key">c-tall</span></div>
<div class="cell" data-theme="ink"><svg class="fig" viewBox="0 0 100 130"><use href="#c-triangle"/></svg><span class="tag">triangle</span><span class="key">c-triangle</span></div>
<div class="cell" data-theme="ink"><svg class="fig" viewBox="0 0 100 130"><use href="#c-pill"/></svg><span class="tag">pill</span><span class="key">c-pill</span></div>
<div class="cell" data-theme="ink"><svg class="fig" viewBox="0 0 100 130"><use href="#c-cloud"/></svg><span class="tag">cloud</span><span class="key">c-cloud</span></div>
<div class="cell" data-theme="ink"><svg class="fig" viewBox="0 0 100 130"><use href="#c-ghost"/></svg><span class="tag">ghost</span><span class="key">c-ghost</span></div>
</div>
</div></body></html>
