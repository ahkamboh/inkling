<html><head><meta charset="utf-8"><meta name="inkling:transition" content="rise"><link rel="stylesheet" href="../styles/themes.css"><style>
html,body{margin:0;background:#fff}.stage{width:1920px}
svg.sc{display:block;width:1920px;height:1080px}
.sc text{font-family:'Bradley Hand','Chalkboard SE','Comic Sans MS',cursive}
.bd{fill:var(--fill);stroke:var(--ink);stroke-width:var(--bw);stroke-linejoin:round}.ey{fill:var(--eye)}
.lg,.am{fill:none;stroke:var(--ink);stroke-width:var(--bw);stroke-linecap:round}
.stone{fill:var(--bg);stroke:var(--ink);stroke-width:2.4}
.ms,.eyg,.stn,.chk,.lbl{transform-box:fill-box}
.ms{transform-origin:center bottom;animation:br 2.8s infinite ease-in-out}
.eyg{transform-origin:center;animation:bk 2.8s infinite ease-in-out}
.stn{transform-origin:center bottom;animation:rise .6s .4s cubic-bezier(.3,1.5,.5,1) both}
.chk{transform-origin:center;animation:chk 2.8s ease-in-out both}
.lbl{animation:fin .5s 1.0s ease-out both}
@keyframes br{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.02)}}
@keyframes bk{0%,80%,100%{transform:scaleY(1)}85%{transform:scaleY(.1)}90%{transform:scaleY(1)}}
@keyframes rise{0%{opacity:0;transform:translateY(26px) scale(.7)}70%{opacity:1;transform:translateY(-3px) scale(1.04)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes chk{0%,52%{opacity:0;transform:scale(.2)}64%{opacity:1;transform:scale(1.3)}74%{transform:scale(.95)}100%{opacity:1;transform:scale(1)}}
@keyframes fin{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
</style></head><body><div class="stage">
<svg class="sc" viewBox="0 0 680 383"><rect width="680" height="383" fill="var(--bg)"/>
<g transform="translate(150,0)"><g class="ms">
<path class="bd" d="M140,202 C113,202 106,244 109,272 C110,288 124,296 140,296 C156,296 170,288 171,272 C174,244 167,202 140,202 Z"/>
<g class="eyg"><circle class="ey" cx="131" cy="242" r="5"/><circle class="ey" cx="149" cy="242" r="5"/></g>
<path class="lg" d="M133,295 L131,310 M147,295 L149,310 M125,310 L139,310 M143,310 L157,310"/>
<path class="am" d="M114,252 C104,256 99,264 100,274"/><path class="am" d="M168,252 C178,256 183,264 182,274"/>
</g></g>
<g class="stn"><rect class="stone" x="300" y="318" width="120" height="34" rx="6"/>
<g class="chk"><path d="M348,334 L356,344 L374,322" fill="none" stroke="var(--a1)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></g></g>
<text class="lbl" x="360" y="300" text-anchor="middle" font-size="24" fill="var(--a1)">one proof</text>
<text class="lbl" x="340" y="120" text-anchor="middle" font-size="28" fill="var(--label)">trust is built one small win…</text>
</svg></div></body></html>
