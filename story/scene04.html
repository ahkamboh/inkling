<html><head><meta charset="utf-8"><meta name="inkling:transition" content="wipe"><link rel="stylesheet" href="../styles/themes.css"><style>
html,body{margin:0;background:#fff}.stage{width:1920px}
svg.sc{display:block;width:1920px;height:1080px}
.sc text{font-family:'Bradley Hand','Chalkboard SE','Comic Sans MS',cursive}
.bd{fill:var(--fill);stroke:var(--ink);stroke-width:var(--bw);stroke-linejoin:round}.ey{fill:var(--eye)}
.lg,.am{fill:none;stroke:var(--ink);stroke-width:var(--bw);stroke-linecap:round}
.chip{fill:none;stroke:var(--ink);stroke-width:2}
.ms,.eyg,.am2,.c1,.c2,.c3,.c4,.lbl{transform-box:fill-box}
.ms{transform-origin:center bottom;animation:br 2.8s infinite ease-in-out}
.eyg{transform-origin:center;animation:bk 2.8s infinite ease-in-out}
.am2{transform-origin:left top;animation:tap 1.1s infinite ease-in-out}
.c1{transform-origin:center;animation:pp .4s .5s cubic-bezier(.3,1.7,.5,1) both}
.c2{transform-origin:center;animation:pp .4s 1.0s cubic-bezier(.3,1.7,.5,1) both}
.c3{transform-origin:center;animation:pp .4s 1.5s cubic-bezier(.3,1.7,.5,1) both}
.c4{transform-origin:center;animation:pp .4s 2.0s cubic-bezier(.3,1.7,.5,1) both}
.lbl{animation:fin .5s .3s ease-out both}
@keyframes br{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.02)}}
@keyframes bk{0%,80%,100%{transform:scaleY(1)}85%{transform:scaleY(.1)}90%{transform:scaleY(1)}}
@keyframes tap{0%,100%{transform:rotate(0)}50%{transform:rotate(-10deg)}}
@keyframes pp{0%{opacity:0;transform:scale(.2)}70%{opacity:1;transform:scale(1.3)}100%{opacity:1;transform:scale(1)}}
@keyframes fin{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
</style></head><body><div class="stage">
<svg class="sc" viewBox="0 0 680 383"><rect width="680" height="383" fill="var(--bg)"/>
<g transform="translate(-50,0)"><g class="ms">
<path class="bd" d="M140,202 C113,202 106,244 109,272 C110,288 124,296 140,296 C156,296 170,288 171,272 C174,244 167,202 140,202 Z"/>
<g class="eyg"><circle class="ey" cx="131" cy="242" r="5"/><circle class="ey" cx="149" cy="242" r="5"/></g>
<path class="lg" d="M133,295 L131,310 M147,295 L149,310 M125,310 L139,310 M143,310 L157,310"/>
<path class="am" d="M114,252 C104,256 99,264 100,274"/><path class="am2 am" d="M168,250 C188,244 206,245 220,252"/>
</g></g>
<g font-family="'Bradley Hand',cursive" font-size="18" fill="var(--ink)">
<rect class="chip" x="300" y="120" width="220" height="34" rx="6"/><text x="316" y="143">send the email</text>
<g class="c1"><circle cx="498" cy="137" r="13" fill="none" stroke="var(--a1)" stroke-width="3"/><path d="M491,137 L496,143 L506,130" fill="none" stroke="var(--a1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></g>
<rect class="chip" x="300" y="166" width="220" height="34" rx="6"/><text x="316" y="189">book the slot</text>
<g class="c2"><circle cx="498" cy="183" r="13" fill="none" stroke="var(--a1)" stroke-width="3"/><path d="M491,183 L496,189 L506,176" fill="none" stroke="var(--a1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></g>
<rect class="chip" x="300" y="212" width="220" height="34" rx="6"/><text x="316" y="235">find the receipt</text>
<g class="c3"><circle cx="498" cy="229" r="13" fill="none" stroke="var(--a1)" stroke-width="3"/><path d="M491,229 L496,235 L506,222" fill="none" stroke="var(--a1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></g>
<rect class="chip" x="300" y="258" width="220" height="34" rx="6"/><text x="316" y="281">update the doc</text>
<g class="c4"><circle cx="498" cy="275" r="13" fill="none" stroke="var(--a1)" stroke-width="3"/><path d="M491,275 L496,281 L506,268" fill="none" stroke="var(--a1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></g>
</g>
<text class="lbl" x="340" y="350" text-anchor="middle" font-size="28" fill="var(--label)">it does the steps for you</text>
</svg></div></body></html>
