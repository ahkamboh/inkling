<html><head><meta charset="utf-8"><meta name="inkling:transition" content="push"><link rel="stylesheet" href="../styles/themes.css"><style>
html,body{margin:0;background:#fff}.stage{width:1920px}
svg.sc{display:block;width:1920px;height:1080px}
.sc text{font-family:'Bradley Hand','Chalkboard SE','Comic Sans MS',cursive}
.bd{fill:var(--fill);stroke:var(--ink);stroke-width:var(--bw);stroke-linejoin:round}.ey{fill:var(--eye)}
.lg,.am{fill:none;stroke:var(--ink);stroke-width:var(--bw);stroke-linecap:round}
.box{fill:none;stroke:var(--ink);stroke-width:2}
.ms,.eyg,.maze,.cur,.lbl{transform-box:fill-box}
.ms{transform-origin:center bottom;animation:br 2.8s infinite ease-in-out}
.eyg{transform-origin:center;animation:bk 2.8s infinite ease-in-out}
.maze{transform-origin:center;animation:jit 1.6s infinite ease-in-out}
.cur{offset-path:path("M360,150 L430,170 L380,210 L470,200 L400,250 L460,260");animation:run 2.4s infinite linear}
.lbl{animation:fin .5s .3s ease-out both}
@keyframes br{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.02)}}
@keyframes bk{0%,80%,100%{transform:scaleY(1)}85%{transform:scaleY(.1)}90%{transform:scaleY(1)}}
@keyframes jit{0%{transform:translate(0,0) rotate(0)}25%{transform:translate(1px,-1px) rotate(.3deg)}50%{transform:translate(-1px,1px) rotate(-.3deg)}75%{transform:translate(1px,1px) rotate(.2deg)}100%{transform:translate(0,0)}}
@keyframes run{0%{offset-distance:0%}100%{offset-distance:100%}}
@keyframes fin{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
</style></head><body><div class="stage">
<svg class="sc" viewBox="0 0 680 383"><rect width="680" height="383" fill="var(--bg)"/>
<g transform="translate(-40,0)"><g class="ms">
<path class="bd" d="M140,202 C113,202 106,244 109,272 C110,288 124,296 140,296 C156,296 170,288 171,272 C174,244 167,202 140,202 Z"/>
<g class="eyg"><circle class="ey" cx="131" cy="242" r="5"/><circle class="ey" cx="149" cy="242" r="5"/></g>
<path class="lg" d="M133,295 L131,310 M147,295 L149,310 M125,310 L139,310 M143,310 L157,310"/>
<path class="am" d="M114,252 C104,256 99,264 100,274"/><path class="am" d="M168,254 C180,252 192,252 200,256"/>
</g></g>
<g class="maze">
<rect class="box" x="352" y="138" width="44" height="22" rx="2"/><rect class="box" x="410" y="150" width="40" height="20" rx="2"/><rect class="box" x="360" y="178" width="50" height="22" rx="2"/><rect class="box" x="430" y="184" width="40" height="20" rx="2"/><rect class="box" x="346" y="216" width="46" height="22" rx="2"/><rect class="box" x="406" y="222" width="48" height="22" rx="2"/><rect class="box" x="466" y="214" width="36" height="20" rx="2"/><rect class="box" x="378" y="252" width="46" height="22" rx="2"/><rect class="box" x="438" y="256" width="42" height="20" rx="2"/>
<path d="M396,150 L410,158 M410,190 L430,194 M392,224 L406,230 M424,244 L438,256" fill="none" stroke="var(--ink)" stroke-width="1.4"/>
</g>
<circle class="cur" cx="0" cy="0" r="7" fill="var(--a2)"/>
<text class="lbl" x="430" y="112" text-anchor="middle" font-size="26" fill="var(--a2)">click… click… click…</text>
<text class="lbl" x="340" y="356" text-anchor="middle" font-size="28" fill="var(--label)">the old way: do every step</text>
</svg></div></body></html>
