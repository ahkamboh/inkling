<html><head><meta charset="utf-8"><meta name="inkling:transition" content="dissolve"><link rel="stylesheet" href="../styles/themes.css"><style>
html,body{margin:0;background:#fff}.stage{width:1920px}
svg.sc{display:block;width:1920px;height:1080px}
.sc text{font-family:'Bradley Hand','Chalkboard SE','Comic Sans MS',cursive}
.bd{fill:var(--fill);stroke:var(--ink);stroke-width:var(--bw);stroke-linejoin:round}.ey{fill:var(--eye)}
.lg,.am{fill:none;stroke:var(--ink);stroke-width:var(--bw);stroke-linecap:round}
.ms,.eyg,.spin,.zz,.lbl{transform-box:fill-box}
.ms{transform-origin:center bottom;animation:chill 3s infinite ease-in-out}
.eyg{transform-origin:center;animation:bk 3s infinite ease-in-out}
.spin{transform-origin:center;animation:spin 1.6s infinite linear}
.zz{animation:zz 3s infinite ease-in-out}
.lbl{animation:fin .5s .4s ease-out both}
@keyframes chill{0%,100%{transform:rotate(0)}50%{transform:rotate(-2deg)}}
@keyframes bk{0%,70%,100%{transform:scaleY(1)}80%{transform:scaleY(.1)}88%{transform:scaleY(1)}}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
@keyframes zz{0%,40%{opacity:0;transform:translateY(0)}55%{opacity:.9;transform:translateY(-8px)}80%{opacity:0;transform:translateY(-16px)}100%{opacity:0}}
@keyframes fin{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
</style></head><body><div class="stage">
<svg class="sc" viewBox="0 0 680 383"><rect width="680" height="383" fill="var(--bg)"/>
<g transform="translate(40,6) rotate(-6 200 300)"><g class="ms">
<path class="bd" d="M140,202 C113,202 106,244 109,272 C110,288 124,296 140,296 C156,296 170,288 171,272 C174,244 167,202 140,202 Z"/>
<g class="eyg"><circle class="ey" cx="131" cy="240" r="5"/><circle class="ey" cx="149" cy="240" r="5"/></g>
<path class="lg" d="M129,295 L120,308 M151,295 L162,308 M114,308 L128,308 M158,308 L172,308"/>
<path class="am" d="M112,250 C100,250 92,256 90,266"/><path class="am" d="M170,250 C182,250 190,256 192,266"/>
</g></g>
<g class="zz" fill="none" stroke="var(--a3)" stroke-width="2"><path d="M150,150 L166,150 L150,166 L166,166 M168,134 L181,134 L168,147 L181,147"/></g>
<g class="spin" fill="none" stroke="var(--a1)" stroke-width="6" stroke-linecap="round"><path d="M470,250 a52 52 0 1 1 -52 -52" /></g>
<circle cx="470" cy="198" r="6" fill="var(--a1)"/>
<text class="lbl" x="450" y="332" text-anchor="middle" font-size="26" fill="var(--a1)">working…</text>
<text class="lbl" x="340" y="358" text-anchor="middle" font-size="28" fill="var(--label)">…while you relax</text>
</svg></div></body></html>
