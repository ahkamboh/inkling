<html><head><meta charset="utf-8"><meta name="inkling:transition" content="burst"><link rel="stylesheet" href="../styles/themes.css"><style>
html,body{margin:0;background:#fff}.stage{width:1920px}
svg.sc{display:block;width:1920px;height:1080px}
.sc text{font-family:'Bradley Hand','Chalkboard SE','Comic Sans MS',cursive}
.bd{fill:var(--fill);stroke:var(--ink);stroke-width:var(--bw);stroke-linejoin:round}.ey{fill:var(--eye)}
.lg,.am{fill:none;stroke:var(--ink);stroke-width:var(--bw);stroke-linecap:round}
.ms,.eyg,.spark,.rays,.lbl{transform-box:fill-box}
.ms{transform-origin:center bottom;animation:br 2.8s infinite ease-in-out}
.eyg{transform-origin:center;animation:bk 2.8s infinite ease-in-out}
.spark{transform-origin:center;animation:sp 2.8s ease-in-out both}
.rays{transform-origin:center;animation:ry 2.8s ease-in-out both}
.lbl{animation:fin .5s 1.2s ease-out both}
@keyframes br{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.02)}}
@keyframes bk{0%,80%,100%{transform:scaleY(1)}85%{transform:scaleY(.1)}90%{transform:scaleY(1)}}
@keyframes sp{0%,15%{opacity:0;transform:scale(.2) rotate(-20deg)}35%{opacity:1;transform:scale(1.2) rotate(8deg)}52%{transform:scale(.95) rotate(0)}62%{transform:scale(1.05)}100%{opacity:1;transform:scale(1)}}
@keyframes ry{0%,25%{opacity:0;transform:scale(.5)}45%{opacity:.85;transform:scale(1.15)}70%{opacity:.45;transform:scale(1)}100%{opacity:.45}}
@keyframes fin{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
</style></head><body><div class="stage">
<svg class="sc" viewBox="0 0 680 383"><rect width="680" height="383" fill="var(--bg)"/>
<g class="rays" fill="none" stroke="var(--a1)" stroke-width="4" stroke-linecap="round"><path d="M340,70 L340,48 M384,86 L400,70 M296,86 L280,70 M398,118 L420,112 M282,118 L260,112"/></g>
<path class="spark" d="M340,82 L350,108 L378,118 L350,128 L340,154 L330,128 L302,118 L330,108 Z" fill="var(--a1)" stroke="var(--ink)" stroke-width="3" stroke-linejoin="round"/>
<g transform="translate(200,30)"><g class="ms">
<path class="bd" d="M140,202 C113,202 106,244 109,272 C110,288 124,296 140,296 C156,296 170,288 171,272 C174,244 167,202 140,202 Z"/>
<g class="eyg"><circle class="ey" cx="131" cy="240" r="5"/><circle class="ey" cx="149" cy="240" r="5"/></g>
<path class="lg" d="M133,295 L131,310 M147,295 L149,310 M125,310 L139,310 M143,310 L157,310"/>
<path class="am" d="M114,250 C104,246 99,254 100,264"/><path class="am" d="M168,250 C178,246 183,254 182,264"/>
</g></g>
<text class="lbl" x="340" y="356" text-anchor="middle" font-size="28" fill="var(--label)">a new way to work</text>
</svg></div></body></html>
