<html><head><meta charset="utf-8"><meta name="inkling:transition" content="reveal"><link rel="stylesheet" href="../styles/themes.css"><style>
html,body{margin:0;background:#fff}.stage{width:1920px}
svg.sc{display:block;width:1920px;height:1080px}
.sc text{font-family:'Bradley Hand','Chalkboard SE','Comic Sans MS',cursive}
.bd{fill:var(--fill);stroke:var(--ink);stroke-width:var(--bw);stroke-linejoin:round}.ey{fill:var(--eye)}
.lg,.am{fill:none;stroke:var(--ink);stroke-width:var(--bw);stroke-linecap:round}
.ms,.eyg,.bub,.pth,.chk,.lbl{transform-box:fill-box}
.ms{transform-origin:center bottom;animation:br 2.8s infinite ease-in-out}
.eyg{transform-origin:center;animation:bk 2.8s infinite ease-in-out}
.bub{transform-origin:left bottom;animation:pop .5s .3s cubic-bezier(.3,1.6,.5,1) both}
.pth{animation:draw 2.8s ease-in-out both}
.chk{transform-origin:center;animation:chk 2.8s ease-in-out both}
.lbl{animation:fin .5s .9s ease-out both}
@keyframes br{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.02)}}
@keyframes bk{0%,80%,100%{transform:scaleY(1)}85%{transform:scaleY(.1)}90%{transform:scaleY(1)}}
@keyframes pop{0%{opacity:0;transform:scale(.3)}70%{opacity:1;transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}
@keyframes draw{0%,18%{stroke-dashoffset:380;opacity:0}24%{opacity:1}78%{stroke-dashoffset:0;opacity:1}100%{stroke-dashoffset:0;opacity:1}}
@keyframes chk{0%,72%{opacity:0;transform:scale(.2)}84%{opacity:1;transform:scale(1.25)}92%{transform:scale(.95)}100%{opacity:1;transform:scale(1)}}
@keyframes fin{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
</style></head><body><div class="stage">
<svg class="sc" viewBox="0 0 680 383"><rect width="680" height="383" fill="var(--bg)"/>
<g transform="translate(-40,0)"><g class="ms">
<path class="bd" d="M140,202 C113,202 106,244 109,272 C110,288 124,296 140,296 C156,296 170,288 171,272 C174,244 167,202 140,202 Z"/>
<g class="eyg"><circle class="ey" cx="131" cy="242" r="5"/><circle class="ey" cx="149" cy="242" r="5"/></g>
<path class="lg" d="M133,295 L131,310 M147,295 L149,310 M125,310 L139,310 M143,310 L157,310"/>
<path class="am" d="M114,252 C104,256 99,264 100,274"/><path class="am" d="M168,252 C180,252 192,254 200,260"/>
</g></g>
<g class="bub"><path d="M150,150 C140,150 134,158 134,166 C134,174 140,180 150,180 L158,180 L152,194 L168,180 L188,180 C198,180 204,174 204,166 C204,158 198,150 188,150 Z" fill="var(--bg)" stroke="var(--ink)" stroke-width="var(--bw)"/><circle cx="156" cy="166" r="2.4" fill="var(--ink)"/><circle cx="169" cy="166" r="2.4" fill="var(--ink)"/><circle cx="182" cy="166" r="2.4" fill="var(--ink)"/></g>
<path class="pth" d="M224,250 C300,210 360,300 440,250 C500,214 540,238 560,244" fill="none" stroke="var(--a1)" stroke-width="5" stroke-linecap="round" stroke-dasharray="380"/>
<g class="chk"><circle cx="588" cy="244" r="22" fill="none" stroke="var(--ink)" stroke-width="4"/><path d="M577,244 L585,253 L601,231" fill="none" stroke="var(--a1)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></g>
<text class="lbl" x="380" y="190" text-anchor="middle" font-size="26" fill="var(--a3)">just tell it</text>
<text class="lbl" x="340" y="356" text-anchor="middle" font-size="28" fill="var(--label)">the new way: say what you want</text>
</svg></div></body></html>
